<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>arrayToRawPath() GSAP Demo</title>
    <link href='//fonts.googleapis.com/css?family=Signika+Negative:300,400' rel='stylesheet' type='text/css'>
    <link rel='stylesheet' href='https://codepen.io/GreenSock/pen/xxmzBrw.css'>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            text-align: center;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 2rem;
        }

        h1 {
            margin: 20px;
            text-align: center;
        }

        svg {
            overflow: visible;
            height: 100%;
            max-width: 100%;
        }

        circle {
            fill: var(--color-surface-white);
        }

        path {
            stroke-width: 3px;
            stroke: var(--color-orangey);
            fill: none;
        }

        .nav {
            display: flex;
            justify-content: center;
            padding: 0 0 20px 0;
            align-content: center;
        }

        .gsap-3-logo {
            width: 20vw;
            max-width: 150px;
            position: fixed;
            bottom: 15px;
            right: 15px;
        }
    </style>

</head>

<body>
    <p class="braces">arrayToRawPath() GSAP Demo</p>

    <svg id="svg" viewBox="0 0 900 200">
        <path id="path" />
    </svg>
    <script src='https://assets.codepen.io/16327/gsap-latest-beta.min.js'></script>
    <script src='https://assets.codepen.io/16327/MotionPathPlugin.min.js'></script>
    <script src='https://s3-us-west-2.amazonaws.com/s.cdpn.io/16327/DrawSVGPlugin3.min.js'></script>
    <script>
        gsap.registerPlugin(MotionPathPlugin);

        let anchors = [{ x: 50, y: 130 }, { x: 300, y: 10 }, { x: 510, y: 100 }, { x: 700, y: 190 }, { x: 850, y: 100 }], // anchor coordinates (feel free to change these if you want)
            rawPath = MotionPathPlugin.arrayToRawPath(anchors, { curviness: 0.5 }),
            path = document.querySelector("#path"),
            svg = document.querySelector("#svg");

        path.setAttribute("d", MotionPathPlugin.rawPathToString(rawPath));

        // place the anchors as <circle> elements
        for (let i = 0; i < anchors.length; i++) {
            createSVG("circle", svg, { cx: anchors[i].x, cy: anchors[i].y, r: 5 });
        }

        // animate with drawSVG
        gsap.from(path, {
            drawSVG: false,
            duration: 4,
            ease: "power1.inOut"
        });

        // helper function for creating SVG elements
        function createSVG(type, container, attributes) {
            var element = document.createElementNS("http://www.w3.org/2000/svg", type),
                reg = /([a-z])([A-Z])/g,
                p;
            for (p in attributes) {
                element.setAttributeNS(null, p.replace(reg, "$1-$2").toLowerCase(), attributes[p]);
            }
            container.appendChild(element);
            return element;
        }
    </script>

</body>

</html>
